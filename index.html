<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geração de DANFE</title>
<style>
    body {
        background-color: #ffffff;
        color: #007bff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        text-align: center;
    }
    input[type="number"] {
        padding: 10px;
        margin: 10px;
    }
    button {
        padding: 10px 20px;
        background-color: #007bff;
        color: #ffffff;
        border: none;
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="container">
    <h1>Geração de DANFE</h1>
    <input type="number" id="numero">
    <button onclick="gerarDanfe()">Gerar</button>
</div>

<script>
function gerarDanfe() {
    var numero = document.getElementById('numero').value;
    if (numero) {
        var url = 'https://supportfly.veplex.com.br/adm/especifico/rel_danfe.php?f_cd_nota_fiscal=' + numero;
        window.open(url, '_blank');
    } else {
        alert('Por favor, digite um número válido.');
    }
}
</script>
</body>
</html>
